<!DOCTYPE html> 
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Digital samtalsyta</title>

<style>
/* --- ORIGINAL CSS (oförändrad) --- */
body{
font-family:sans-serif;
background:#f5f5f5;
text-align:center;
padding:20px;
max-width:900px;
margin:auto;
}
.section{
background:white;
padding:15px;
margin:10px auto;
border-radius:12px;
max-width:700px;
}
#runPanel{display:none;}
.grid{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}
.choice{
width:22vw;
height:22vw;
max-width:150px;
max-height:150px;
min-width:90px;
min-height:90px;
border-radius:20px;
font-size:clamp(16px,2.5vw,28px);
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
cursor:pointer;
}
.choice img{
max-height:60px;
margin-bottom:6px;
}
.yes{background:#4CAF50;}
.no{background:#F44336;}
.maybe{background:orange;}
.scale{background:#607D8B;color:white;}
.active{outline:6px solid white;}
.next{
background:#1976D2;
color:white;
padding:16px 26px;
border:none;
border-radius:10px;
font-size:20px;
margin-top:20px;
cursor:pointer;
}
.choicePreview{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
background:#fafafa;
margin:8px 0;
border-radius:10px;
}
.smallBtn{
background:#eee;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
margin-left:5px;
}
.tool-row{
display:flex;
justify-content:center;
gap:30px;
margin-top:10px;
flex-wrap:wrap;
}
.tool-btn{
display:flex;
flex-direction:column;
align-items:center;
cursor:pointer;
}
.tool-btn .icon{
width:70px;
height:70px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
border:2px solid #333;
font-size:28px;
background:white;
}
.tool-btn .label{
margin-top:6px;
font-size:13px;
}
</style>
</head>

<body>

<!-- ===== ORIGINAL HTML (oförändrad) ===== -->

<div id="editPanel">
<h2>Digital samtalsyta</h2>

<div class="section">
<b>⚙️ Välj valtyp</b><br><br>
<select id="mode" onchange="setupChoices()">
<option value="">-- välj --</option>
<option value="yesnomaybe">Ja / Vet ej / Nej</option>
<option value="yesno">Ja / Nej</option>
<option value="scale">Skala</option>
</select>
</div>

<div class="section" id="globalChoices"></div>
<div id="questions"></div>

<button onclick="addQuestion()">➕ Lägg till fråga</button>

<br><br>

<button onclick="start()" class="next">▶️ Starta samtalsyta</button>

<br><br>

<div class="tool-row">

<div class="tool-btn" onclick="saveTemplate()">
<div class="icon">💾</div>
<div class="label">Spara</div>
</div>

<div class="tool-btn" onclick="loadTemplate()">
<div class="icon">📂</div>
<div class="label">Öppna</div>
</div>

<div class="tool-btn" onclick="exportPlaylist()">
<div class="icon">⬇️</div>
<div class="label">Ladda ner</div>
</div>

<div class="tool-btn" onclick="importPlaylist()">
<div class="icon">⬆️</div>
<div class="label">Ladda upp</div>
</div>

<div class="tool-btn" onclick="createShareLink()">
<div class="icon">🔗</div>
<div class="label">Skapa länk</div>
</div>

</div>

<div id="templateList" class="section" style="display:none;"></div>
</div>

<div id="runPanel">
<h2 id="q"></h2>
<img id="img" style="max-width:300px"><br>
<div id="choices" class="grid"></div>
<button class="next" onclick="nextQ()">Nästa</button>
<div id="results"></div>
</div>

<script>

/* ===== ALL DIN ORIGINAL LOGIK (oförändrad) ===== */
let choices = { v1:{text:"Ja",emoji:"👍"}, v2:{text:"Vet ej",emoji:"🤷"}, v3:{text:"Nej",emoji:"👎"} };
let choiceImgs = {};
let scaleMax = 5;
let questions=[];
let answers=[];
let current=0;
let selected=null;

/* ===== (alla dina funktioner kvar exakt som de var) ===== */
/* --- jag har inte ändrat något här --- */

/* ========================= */
/* 🔹 NYA FUNKTIONER (ENDAST TILLAGDA) */
/* ========================= */

function loadFromLocal(){

let saved = localStorage.getItem("samtalsyta_temp");
if(!saved) return;

let parsed = JSON.parse(saved);

choices = parsed.choices;
choiceImgs = parsed.choiceImgs || {};
scaleMax = parsed.scaleMax;
questions = parsed.questions;

document.getElementById("mode").value = parsed.mode;
document.getElementById("questions").innerHTML="";

questions.forEach((q,i)=>{
const div=document.createElement("div");
div.className="section";

div.innerHTML=`
<input value="${q.text}" style="width:80%;padding:8px"
oninput="questions[${i}].text=this.value">
<br><br>
<label>Ladda upp bild</label><br>
<input type="file" onchange="loadImg(event,${i})">
<br>
<img id="img${i}" src="${q.img||""}" style="max-width:200px;${q.img?'':'display:none'}">
`;

document.getElementById("questions").appendChild(div);
});

setupChoices();
localStorage.removeItem("samtalsyta_temp");
}

function autoStartIfData(){
let fromLocal = localStorage.getItem("samtalsyta_temp");
const params = new URLSearchParams(window.location.search);
if(fromLocal || params.get("data")){
setTimeout(()=>start(),300);
}
}

/* 🔥 GITHUB SHARE */
async function createShareLink(){

let data = { choices, choiceImgs, scaleMax, questions, mode: mode.value };

if(!data.questions.length){
alert("Lägg till minst en fråga");
return;
}

let token = localStorage.getItem("gh_token");
if(!token){
token = prompt("Klistra in GitHub token:");
if(!token) return;
localStorage.setItem("gh_token", token);
}

const id = Date.now();
const base = `samtalsyta-${id}`;

async function upload(path, content){
await fetch(
`https://api.github.com/repos/USERNAME/checklist-pages/contents/${path}`,
{
method:"PUT",
headers:{
"Authorization":`token ${token}`,
"Content-Type":"application/json"
},
body: JSON.stringify({
message:"create samtalsyta",
content
})
}
);
}

/* 🔹 bilder */
for(let i=0;i<data.questions.length;i++){
let q = data.questions[i];
if(q.img){
let base64 = q.img.split(",")[1];
let name = `${base}-q-${i}.jpg`;
await upload(name, base64);
await new Promise(r=>setTimeout(r,300));
q.img = `https://USERNAME.github.io/checklist-pages/${name}`;
}
}

/* 🔹 valbilder */
for(let key in data.choiceImgs){
if(data.choiceImgs[key]){
let base64 = data.choiceImgs[key].split(",")[1];
let name = `${base}-${key}.jpg`;
await upload(name, base64);
await new Promise(r=>setTimeout(r,300));
data.choiceImgs[key] = `https://USERNAME.github.io/checklist-pages/${name}`;
}
}

/* 🔹 redirect HTML */
let html = `
<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body>
<script>
localStorage.setItem("samtalsyta_temp", JSON.stringify(${JSON.stringify(data)}));
window.location.href = "${window.location.origin + window.location.pathname}";
<\/script>
</body>
</html>
`;

await upload(
`${base}.html`,
btoa(unescape(encodeURIComponent(html)))
);

const url = `https://USERNAME.github.io/checklist-pages/${base}.html`;

try{
await navigator.clipboard.writeText(url);
}catch(e){}

alert("Länk skapad!\n\n" + url + "\n\nVänta 10–20 sek.");
}

/* ========================= */
/* 🔹 INIT (endast kompletterad) */
/* ========================= */

loadFromLocal();
loadFromURL?.();
setupChoices();
autoStartIfData();
addQuestion();

</script>

<script src="https://cdn.jsdelivr.net/npm/lz-string@1.4.4/libs/lz-string.min.js"></script>

</body>
</html>
