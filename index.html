<!-- ALL DIN ORIGINALKOD ÄR IDENTISK FRAM TILL SCRIPT -->

<script>

// 🔥 NY FUNKTION – skapa länk (komprimerad + kopiera)
function createShareLink(){

let data = {
choices,
choiceImgs,
scaleMax,
questions,
mode: mode.value
};

let compressed = LZString.compressToEncodedURIComponent(JSON.stringify(data));

let url = window.location.origin + window.location.pathname + "?data=" + compressed;

navigator.clipboard.writeText(url).then(()=>{
alert("Länk kopierad!");
}).catch(()=>{
prompt("Kopiera länken:", url);
});

}


// 🔥 NY FUNKTION – ladda från länk
function loadFromURL(){

const params = new URLSearchParams(window.location.search);
const data = params.get("data");

if(!data) return;

try{

let decompressed = LZString.decompressFromEncodedURIComponent(data);
let parsed = JSON.parse(decompressed);

choices = parsed.choices || choices;
choiceImgs = parsed.choiceImgs || {};
scaleMax = parsed.scaleMax || 5;
questions = parsed.questions || [];

document.getElementById("mode").value = parsed.mode || "";
document.getElementById("questions").innerHTML="";

questions.forEach((q,i)=>{

const div=document.createElement("div");
div.className="section";

div.innerHTML=`
<input value="${q.text}" style="width:80%;padding:8px"
oninput="questions[${i}].text=this.value">

<br><br>
<label>Ladda upp bild</label><br>
<input type="file" onchange="loadImg(event,${i})">

<br>
<img id="img${i}" src="${q.img||""}" style="max-width:200px;${q.img?'':'display:none'}">
`;

document.getElementById("questions").appendChild(div);

});

setupChoices();
alert("Frågelista laddad från länk!");

}catch(e){
console.error(e);
alert("Kunde inte läsa länken");
}

}


// 🔥 KÖR AUTOMATISKT (utan att störa något annat)
loadFromURL();

</script>

<!-- 🔥 LÄGG TILL DENNA PRECIS INNAN </body> -->
<script src="https://cdn.jsdelivr.net/npm/lz-string@1.4.4/libs/lz-string.min.js"></script>
