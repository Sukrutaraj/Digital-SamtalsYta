
<!DOCTYPE html> 
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Digital samtalsyta</title>

<style>
body{
font-family:sans-serif;
background:#f5f5f5;
text-align:center;
padding:20px;
max-width:900px;
margin:auto;
}

.section{
background:white;
padding:15px;
margin:10px auto;
border-radius:12px;
max-width:700px;
}

#runPanel{display:none;}

.grid{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}

.choice{
width:22vw;
height:22vw;
max-width:150px;
max-height:150px;
min-width:90px;
min-height:90px;

border-radius:20px;
font-size:clamp(16px,2.5vw,28px);

display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
cursor:pointer;
}

.choice img{
max-height:60px;
margin-bottom:6px;
}

.yes{background:#4CAF50;}
.no{background:#F44336;}
.maybe{background:orange;}
.scale{background:#607D8B;color:white;}

.active{outline:6px solid white;}

.next{
background:#1976D2;
color:white;
padding:16px 26px;
border:none;
border-radius:10px;
font-size:20px;
margin-top:20px;
cursor:pointer;
}

.choicePreview{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
background:#fafafa;
margin:8px 0;
border-radius:10px;
}

.smallBtn{
background:#eee;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
margin-left:5px;
}

.tool-row{
display:flex;
justify-content:center;
gap:30px;
margin-top:10px;
flex-wrap:wrap;
}

.tool-btn{
display:flex;
flex-direction:column;
align-items:center;
cursor:pointer;
}

.tool-btn .icon{
width:70px;
height:70px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
border:2px solid #333;
font-size:28px;
background:white;
}

.tool-btn .label{
margin-top:6px;
font-size:13px;
}
</style>
</head>

<body>

<div id="editPanel">

<h2>Digital samtalsyta</h2>

<div class="section">
<b>⚙️ Välj valtyp</b><br><br>
<select id="mode" onchange="setupChoices()">
<option value="">-- välj --</option>
<option value="yesnomaybe">Ja / Vet ej / Nej</option>
<option value="yesno">Ja / Nej</option>
<option value="scale">Skala</option>
</select>
</div>

<div class="section" id="globalChoices"></div>

<div id="questions"></div>

<button onclick="addQuestion()">➕ Lägg till fråga</button>

<br><br>

<button onclick="start()" class="next">▶️ Starta samtalsyta</button>

<br><br>

<div class="tool-row">

<div class="tool-btn" onclick="saveTemplate()">
<div class="icon">💾</div>
<div class="label">Spara</div>
</div>

<div class="tool-btn" onclick="loadTemplate()">
<div class="icon">📂</div>
<div class="label">Öppna</div>
</div>

<div class="tool-btn" onclick="exportPlaylist()">
<div class="icon">⬇️</div>
<div class="label">Ladda ner</div>
</div>

<div class="tool-btn" onclick="importPlaylist()">
<div class="icon">⬆️</div>
<div class="label">Ladda upp</div>
</div>

<div class="tool-btn" onclick="createShareLink()">
<div class="icon">🔗</div>
<div class="label">Skapa länk</div>
</div>

</div>

<div id="templateList" class="section" style="display:none;"></div>

</div>

<div id="runPanel">
<h2 id="q"></h2>
<img id="img" style="max-width:300px"><br>
<div id="choices" class="grid"></div>
<button class="next" onclick="nextQ()">Nästa</button>
<div id="results"></div>
</div>

<script>

let choices = {
v1:{text:"Ja",emoji:"👍"},
v2:{text:"Vet ej",emoji:"🤷"},
v3:{text:"Nej",emoji:"👎"}
};

let choiceImgs = {};
let scaleMax = 5;

let questions=[];
let answers=[];
let current=0;
let selected=null;

function setupChoices(){
const mode = document.getElementById("mode").value;
const box = document.getElementById("globalChoices");

if(!mode){box.style.display="none";return;}
box.style.display="block";

function row(key){
return `
<div class="choicePreview">
<span>
${choiceImgs[key] 
? '<img src="'+choiceImgs[key]+'" style="height:40px">'
: choices[key].emoji}
 ${choices[key].text}
</span>
<div>
<button class="smallBtn" onclick="editText('${key}')">✏️</button>
<button class="smallBtn" onclick="editEmoji('${key}')">😀</button>
<button class="smallBtn" onclick="uploadChoiceImg('${key}')">🖼️</button>
</div>
</div>`;
}

let html="";

if(mode==="yesnomaybe") html = row("v1")+row("v2")+row("v3");
if(mode==="yesno") html = row("v1")+row("v3");

if(mode==="scale"){
html = `<div class="choicePreview">
<span>Skala 1–${scaleMax}</span>
<button class="smallBtn" onclick="editScale()">🔢 Ändra</button>
</div>`;
}

box.innerHTML = html;
}

function editText(key){
let v = prompt("Ny text:", choices[key].text);
if(v) choices[key].text = v;
setupChoices();
}

function editEmoji(key){
let v = prompt("Ny emoji:", choices[key].emoji);
if(v){choiceImgs[key]=null;choices[key].emoji=v;}
setupChoices();
}

function uploadChoiceImg(key){
let input = document.createElement("input");
input.type="file";
input.accept="image/*";
input.onchange=e=>{
const r=new FileReader();
r.onload=()=>{choiceImgs[key]=r.result;setupChoices();};
r.readAsDataURL(e.target.files[0]);
};
input.click();
}

function editScale(){
let v = prompt("Hur många steg?", scaleMax);
if(v){scaleMax=parseInt(v);setupChoices();}
}

function addQuestion(){
const i=questions.length;
questions.push({text:"",img:""});

const div=document.createElement("div");
div.className="section";

div.innerHTML=`
<input placeholder="Skriv fråga"
style="width:80%;padding:8px"
oninput="questions[${i}].text=this.value">

<br><br>
<label>Ladda upp bild</label><br>
<input type="file" onchange="loadImg(event,${i})">

<br>
<img id="img${i}" style="max-width:200px;display:none">
`;

document.getElementById("questions").appendChild(div);
}

function loadImg(e,i){
const r=new FileReader();
r.onload=function(){
questions[i].img=this.result;
const img=document.getElementById("img"+i);
img.src=this.result;
img.style.display="block";
};
r.readAsDataURL(e.target.files[0]);
}

function start(){
if(questions.length===0){alert("Lägg till minst en fråga");return;}
editPanel.style.display="none";
runPanel.style.display="block";
render();
}

function render(){
if(current>=questions.length){showResults();return;}
q.innerText=questions[current].text;
img.src=questions[current].img||"";

const mode=document.getElementById("mode").value;
const c=document.getElementById("choices");
c.innerHTML="";

function createBtn(label,type,text){
let b=document.createElement("div");
b.className="choice "+type;
b.innerHTML=label;

b.onclick=function(){
selected=text;
document.querySelectorAll(".choice").forEach(x=>x.classList.remove("active"));
b.classList.add("active");
playClick();
setTimeout(()=>speak(text),120);
};

c.appendChild(b);
}

if(mode==="yesnomaybe"){
createBtn(choiceImgs.v1?'<img src="'+choiceImgs.v1+'">':choices.v1.emoji+"<br>"+choices.v1.text,"yes",choices.v1.text);
createBtn(choiceImgs.v2?'<img src="'+choiceImgs.v2+'">':choices.v2.emoji+"<br>"+choices.v2.text,"maybe",choices.v2.text);
createBtn(choiceImgs.v3?'<img src="'+choiceImgs.v3+'">':choices.v3.emoji+"<br>"+choices.v3.text,"no",choices.v3.text);
}

if(mode==="yesno"){
createBtn(choiceImgs.v1?'<img src="'+choiceImgs.v1+'">':choices.v1.emoji+"<br>"+choices.v1.text,"yes",choices.v1.text);
createBtn(choiceImgs.v3?'<img src="'+choiceImgs.v3+'">':choices.v3.emoji+"<br>"+choices.v3.text,"no",choices.v3.text);
}
}

function playClick(){
const click = new Audio("klick.mpeg-4");
click.currentTime = 0;
click.play();
}

function speak(t){
speechSynthesis.cancel();
let msg=new SpeechSynthesisUtterance(t);
msg.lang="sv-SE";
speechSynthesis.speak(msg);
}

function nextQ(){
if(!selected)return;
answers.push({q:questions[current].text,a:selected});
selected=null;
current++;
render();
}

function showResults(){
let r=results;
r.innerHTML=`<h2>Resultat</h2>
<button onclick="downloadResults()" class="next">⬇ Ladda ner resultat</button>
<button onclick="shareResults()" class="next">📩 Skicka resultat</button>`;

answers.forEach((x,i)=>{
r.innerHTML+=`<div class="section">
<b>Fråga ${i+1}</b><br>${x.q}<br>Svar: ${x.a}</div>`;
});
}

function downloadResults(){
let content="RESULTAT\n\n";
answers.forEach((x,i)=>{
content+="Fråga "+(i+1)+"\n"+x.q+"\nSvar: "+x.a+"\n\n";
});
let blob=new Blob([content],{type:"text/plain"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="resultat.txt";
a.click();
}

/* 🔧 FIXAD SHARE */

function sharePlaylist(){
try{
let data = JSON.stringify({choices,choiceImgs,scaleMax,questions,mode:mode.value});
let blob=new Blob([data],{type:"application/json"});
let file=new File([blob],"samtalsyta.json");

if(navigator.canShare && navigator.canShare({files:[file]})){
navigator.share({files:[file]});
}else{
exportPlaylist();
}
}catch(e){
exportPlaylist();
}
}

function shareResults(){
try{
let content="RESULTAT\n\n";
answers.forEach((x,i)=>{
content+="Fråga "+(i+1)+"\n"+x.q+"\nSvar: "+x.a+"\n\n";
});
let blob=new Blob([content],{type:"text/plain"});
let file=new File([blob],"resultat.txt");

if(navigator.canShare && navigator.canShare({files:[file]})){
navigator.share({files:[file]});
}else{
downloadResults();
}
}catch(e){
downloadResults();
}
}

function saveTemplate(){
let name=prompt("Namn på mallen:");
if(!name)return;
localStorage.setItem("samtalsyta_"+name,JSON.stringify({choices,choiceImgs,scaleMax,questions,mode:mode.value}));
alert("Sparad!");
}

function loadTemplate(){
let keys=Object.keys(localStorage).filter(k=>k.startsWith("samtalsyta_"));
let list=document.getElementById("templateList");
list.style.display="block";
list.innerHTML="<h3>Välj mall</h3>";

keys.forEach(key=>{
let name=key.replace("samtalsyta_","");
let div=document.createElement("div");
div.className="choicePreview";

let btn=document.createElement("button");
btn.innerText=name;
btn.className="smallBtn";

btn.onclick=function(){
loadTemplateData(key);
list.style.display="none";
};

div.appendChild(btn);
list.appendChild(div);
});
}

function loadTemplateData(key){
let data=JSON.parse(localStorage.getItem(key));

choices=data.choices;
choiceImgs=data.choiceImgs||{};
scaleMax=data.scaleMax;
questions=data.questions;

document.getElementById("mode").value=data.mode;
document.getElementById("questions").innerHTML="";

questions.forEach((q,i)=>{
const div=document.createElement("div");
div.className="section";

div.innerHTML=`
<input value="${q.text}" style="width:80%;padding:8px"
oninput="questions[${i}].text=this.value">

<br><br>
<label>Ladda upp bild</label><br>
<input type="file" onchange="loadImg(event,${i})">

<br>
<img id="img${i}" src="${q.img||""}" style="max-width:200px;${q.img?'':'display:none'}">
`;

document.getElementById("questions").appendChild(div);
});

setupChoices();
}

function exportPlaylist(){
let blob=new Blob([JSON.stringify({choices,choiceImgs,scaleMax,questions,mode:mode.value})],{type:"application/json"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="frågelista.json";
a.click();
}

function importPlaylist(){

let input=document.createElement("input");
input.type="file";
input.accept="application/json";

input.onchange=e=>{
let r=new FileReader();

r.onload=()=>{
try{
let data=JSON.parse(r.result);

choices=data.choices;
choiceImgs=data.choiceImgs||{};
scaleMax=data.scaleMax;
questions=data.questions;

document.getElementById("mode").value=data.mode;
document.getElementById("questions").innerHTML="";

questions.forEach((q,i)=>{

const div=document.createElement("div");
div.className="section";

div.innerHTML=`
<input value="${q.text}" style="width:80%;padding:8px"
oninput="questions[${i}].text=this.value">

<br><br>
<label>Ladda upp bild</label><br>
<input type="file" onchange="loadImg(event,${i})">

<br>
<img id="img${i}" src="${q.img||""}" style="max-width:200px;${q.img?'':'display:none'}">
`;

document.getElementById("questions").appendChild(div);

});

async function createShareLink(){

let data = {
choices,
choiceImgs,
scaleMax,
questions,
mode: document.getElementById("mode").value
};

if(!data.questions.length){
alert("Lägg till minst en fråga");
return;
}

// token
let token = localStorage.getItem("gh_token");
if(!token){
token = prompt("Klistra in GitHub token:");
if(!token) return;
localStorage.setItem("gh_token", token);
}

const id = Date.now();
const base = `samtal-${id}`;

async function upload(path, content){
await fetch(
`https://api.github.com/repos/sukrutaraj/checklist-pages/contents/${path}`,
{
method:"PUT",
headers:{
"Authorization":`token ${token}`,
"Content-Type":"application/json"
},
body: JSON.stringify({
message:"create samtal",
content
})
}
);
}

// 🔹 upload bilder
for(let i=0;i<data.questions.length;i++){
let q = data.questions[i];

if(q.img){
let base64 = q.img.split(",")[1];
let name = `${base}-q-${i}.jpg`;

await upload(name, base64);
await new Promise(r=>setTimeout(r,300));

q.img = `https://sukrutaraj.github.io/checklist-pages/${name}`;
}
}

// 🔹 choice bilder
for(let key in data.choiceImgs){
if(data.choiceImgs[key]){
let base64 = data.choiceImgs[key].split(",")[1];
let name = `${base}-${key}.jpg`;

await upload(name, base64);
await new Promise(r=>setTimeout(r,300));

data.choiceImgs[key] = `https://sukrutaraj.github.io/checklist-pages/${name}`;
}
}

// 🔹 HTML (din riktiga UI-logik)
let html = `
<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Samtalsyta</title>

<style>
${document.querySelector("style").innerHTML}
</style>

</head>

<body>

<div id="runPanel">
<h2 id="q"></h2>
<img id="img" style="max-width:300px"><br>
<div id="choices" class="grid"></div>
<button class="next" onclick="nextQ()">Nästa</button>
<div id="results"></div>
</div>

<script>

let choices = ${JSON.stringify(data.choices)};
let choiceImgs = ${JSON.stringify(data.choiceImgs)};
let scaleMax = ${data.scaleMax};
let questions = ${JSON.stringify(data.questions)};
let answers = [];
let current = 0;
let selected = null;

function playClick(){
const click = new Audio("klick.mpeg-4");
click.currentTime = 0;
click.play();
}

function speak(t){
speechSynthesis.cancel();
let msg=new SpeechSynthesisUtterance(t);
msg.lang="sv-SE";
speechSynthesis.speak(msg);
}

function render(){
if(current>=questions.length){
document.body.innerHTML="<h2>Klar!</h2>";
return;
}

q.innerText=questions[current].text;
img.src=questions[current].img||"";

const mode="${data.mode}";
const c=document.getElementById("choices");
c.innerHTML="";

function createBtn(label,type,text){
let b=document.createElement("div");
b.className="choice "+type;
b.innerHTML=label;

b.onclick=function(){
selected=text;
document.querySelectorAll(".choice").forEach(x=>x.classList.remove("active"));
b.classList.add("active");
playClick();
setTimeout(()=>speak(text),120);
};

c.appendChild(b);
}

if(mode==="yesnomaybe"){
createBtn(choiceImgs.v1?'<img src="'+choiceImgs.v1+'">':choices.v1.emoji+"<br>"+choices.v1.text,"yes",choices.v1.text);
createBtn(choiceImgs.v2?'<img src="'+choiceImgs.v2+'">':choices.v2.emoji+"<br>"+choices.v2.text,"maybe",choices.v2.text);
createBtn(choiceImgs.v3?'<img src="'+choiceImgs.v3+'">':choices.v3.emoji+"<br>"+choices.v3.text,"no",choices.v3.text);
}

if(mode==="yesno"){
createBtn(choiceImgs.v1?'<img src="'+choiceImgs.v1+'">':choices.v1.emoji+"<br>"+choices.v1.text,"yes",choices.v1.text);
createBtn(choiceImgs.v3?'<img src="'+choiceImgs.v3+'">':choices.v3.emoji+"<br>"+choices.v3.text,"no",choices.v3.text);
}
}

function nextQ(){
if(!selected)return;
answers.push({q:questions[current].text,a:selected});
selected=null;
current++;
render();
}

render();

<\/script>

</body>
</html>
`;

// upload HTML
await upload(
`${base}.html`,
btoa(unescape(encodeURIComponent(html)))
);

const url = `https://sukrutaraj.github.io/checklist-pages/${base}.html`;

try{
await navigator.clipboard.writeText(url);
}catch(e){}

alert("Länk skapad!\n\n" + url + "\n\nVänta 10–20 sek.");

}

function loadFromURL(){

const params = new URLSearchParams(window.location.search);
const data = params.get("data");

if(!data) return;

try{

let parsed = JSON.parse(decodeURIComponent(data));

choices = parsed.choices || choices;
choiceImgs = parsed.choiceImgs || {};
scaleMax = parsed.scaleMax || 5;
questions = parsed.questions || [];

document.getElementById("mode").value = parsed.mode || "";

document.getElementById("questions").innerHTML="";

questions.forEach((q,i)=>{

const div=document.createElement("div");
div.className="section";

div.innerHTML=`
<input value="${q.text}" style="width:80%;padding:8px"
oninput="questions[${i}].text=this.value">

<br><br>
<label>Ladda upp bild</label><br>
<input type="file" onchange="loadImg(event,${i})">

<br>
<img id="img${i}" src="${q.img||""}" style="max-width:200px;${q.img?'':'display:none'}">
`;

document.getElementById("questions").appendChild(div);

});

setupChoices();

alert("Frågelista laddad från länk!");

}catch(e){
console.error(e);
}

}

// kör direkt
loadFromURL(); 

setupChoices();
alert("Frågelista laddad!");

}catch{
alert("Fel fil");
}
};

r.readAsText(e.target.files[0]);
};

input.click();
}

setupChoices();
addQuestion();

</script>
<script src="https://cdn.jsdelivr.net/npm/lz-string@1.4.4/libs/lz-string.min.js"></script>
</body>
</html>
